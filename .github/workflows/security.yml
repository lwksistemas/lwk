name: Security

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:
    branches: [main, master, develop, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django check
        run: python manage.py check
      - name: Clinica da Beleza test suite
        run: python manage.py test clinica_beleza.tests --verbosity=1
      - name: CRM Vendas test suite
        run: python manage.py test crm_vendas.tests --verbosity=1

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: CRM Vitest suite
        run: npm test -- lib/crm-*.test.ts

  backend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: pip install pip-audit bandit

      # Falha o build se houver vulnerabilidades conhecidas nas dependências.
      # Para ignorar temporariamente um CVE específico, use:
      #   pip-audit -r requirements.txt --ignore-vuln PYSEC-XXXX-XXXX
      - name: pip-audit (bloqueia em vulnerabilidades)
        run: pip-audit -r requirements.txt --desc on

      # Análise estática: falha apenas em severidade ALTA (-lll). Médias (ex.: B608
      # em SQL com identificadores quote_name) geram muito ruído em codebase legado.
      - name: bandit (bloqueia em severidade alta)
        run: |
          bandit -r . \
            -x ./tests,./test_*,./*/migrations \
            -lll -q \
            --skip B101

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci

      # Falha o build se houver vulnerabilidades de severidade HIGH ou CRITICAL.
      - name: npm audit (bloqueia em high+)
        run: npm audit --audit-level=high
