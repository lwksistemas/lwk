# Worker django-q: fila assíncrona (WhatsApp, assinatura, e-mails, NFS-e).
# Deploy: railway up --service lwks-worker -c railway.worker.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"
watchPatterns = [
    "backend/**",
    "Dockerfile.railway",
    "railway.worker.toml",
]

[deploy]
startCommand = "python manage.py qcluster"
restartPolicyType = "ON_FAILURE"
# Sem healthcheck HTTP — qcluster não expõe porta (desativar no painel Railway se necessário)
