# Deploy do backend Django na Railway (Heroku continua com o Procfile na raiz).
# Dockerfile evita o Nixpacks a executar o release do Procfile durante o build da imagem.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Imagem Docker: código em /app (conteúdo de backend/), não usar "cd backend".
startCommand = '''sh -c "exec gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2 --threads 2 --worker-class gthread --worker-connections 500 --timeout 60 --log-file - --access-logfile - --error-logfile -"'''
releaseCommand = '''sh -c "python manage.py migrate --noinput && python manage.py ensure_financeiro_lojas && python manage.py ensure_relatorio_comissao_table && python manage.py ensure_clinica_beleza_consultas && python manage.py ensure_appointment_duracao_minutos && python manage.py ensure_professional_nascimento_sexo && python manage.py ensure_memed_timbrado_table && python manage.py migrate_all_lojas && python manage.py setup_initial_data && python manage.py collectstatic --noinput"'''
healthcheckPath = "/api/superadmin/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
