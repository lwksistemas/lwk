[tool.ruff]
target-version = "py312"
line-length = 120
fix = true

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings (trailing whitespace, etc)
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "C90",  # mccabe complexity
]
ignore = [
    "E501",   # line too long (deixar para o formatter)
    "B904",   # raise from (muitos legados)
    "SIM108", # ternary (legibilidade)
    "SIM117", # nested with (legibilidade)
    "B023",   # function-uses-loop-variable (legado intencional)
    "F403",   # star import (legado)
    "F405",   # may-be-undefined from star import (legado)
    "C901",   # TODO: refatorar funções complexas progressivamente
    "G004",   # TODO: migrar f-strings em logging para %s (734 ocorrências)
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = [
    "config",
    "core",
    "superadmin",
    "tenants",
    "crm_vendas",
    "clinica_estetica",
    "clinica_beleza",
    "hotel",
    "homepage",
    "scripts",
    "cabeleireiro",
    "asaas_integration",
    "nfse_integration",
    "whatsapp",
    "notificacoes",
    "push",
]

[tool.ruff.lint.per-file-ignores]
"migrations/*.py" = ["E", "F", "I", "UP"]
"**/migrations/*.py" = ["E", "F", "I", "UP"]
"tests/*.py" = ["B"]
"**/tests/*.py" = ["B"]
"config/settings*.py" = ["E402"]
"scripts/*.py" = ["E402"]
"superadmin/signals/*.py" = ["E402"]
"superadmin/views/*.py" = ["E402"]
"asaas_integration/urls.py" = ["E402"]
"config/urls.py" = ["E402"]
"hotel/views.py" = ["E402"]
"whatsapp/views_evolution_webhook.py" = ["E402"]
"superadmin/management/commands/*.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests", "crm_vendas/tests", "clinica_estetica/tests", "core"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-q --tb=short"
