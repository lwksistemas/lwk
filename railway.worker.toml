# Worker django-q: fila assíncrona (WhatsApp, e-mail, NFS-e, webhooks pagamento).
# Deploy: railway up --service lwks-worker -c railway.worker.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"
watchPatterns = [
    "backend/**",
    "Dockerfile.railway",
    "railway.worker.toml",
]

[deploy]
startCommand = "sh scripts/start_worker.sh"
restartPolicyType = "ON_FAILURE"
# Sem healthcheck HTTP — qcluster não expõe porta (desativar no painel Railway se necessário)
