<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Limpando Cache...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 500px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            min-height: 30px;
        }
        .success {
            color: #4ade80;
            font-weight: bold;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .info {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Limpando Cache</h1>
        <div class="spinner"></div>
        <div class="status" id="status">Removendo cache antigo...</div>
        <div id="result"></div>
        <div class="info">
            <p>Esta página está limpando todo o cache do sistema.</p>
            <p>Aguarde alguns segundos...</p>
        </div>
    </div>

    <script>
        let steps = [
            'Limpando localStorage...',
            'Limpando sessionStorage...',
            'Limpando cookies...',
            'Limpando cache do navegador...',
            'Removendo service workers...',
            'Finalizando limpeza...'
        ];
        
        let currentStep = 0;
        
        function updateStatus() {
            if (currentStep < steps.length) {
                document.getElementById('status').textContent = steps[currentStep];
                currentStep++;
                setTimeout(updateStatus, 500);
            } else {
                finishCleaning();
            }
        }
        
        async function clearEverything() {
            try {
                // 1. Limpar localStorage
                localStorage.clear();
                
                // 2. Limpar sessionStorage
                sessionStorage.clear();
                
                // 3. Limpar cookies
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                
                // 4. Limpar cache do navegador (se suportado)
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                
                // 5. Desregistrar service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => reg.unregister()));
                }
                
                return true;
            } catch (error) {
                console.error('Erro ao limpar cache:', error);
                return false;
            }
        }
        
        function finishCleaning() {
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('status').innerHTML = '<span class="success">✅ Cache limpo com sucesso!</span>';
            document.getElementById('result').innerHTML = `
                <a href="/" class="button">Ir para Login</a>
                <p style="margin-top: 20px; font-size: 0.9em;">
                    Agora você pode fazer login normalmente.<br>
                    A versão mais recente será carregada.
                </p>
            `;
        }
        
        // Iniciar limpeza
        clearEverything().then(() => {
            updateStatus();
        });
    </script>
</body>
</html>
