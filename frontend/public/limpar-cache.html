<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Limpando Cache...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .progress {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>🧹 Limpando Cache</h1>
        <p>Aguarde enquanto limpamos o cache do navegador...</p>
        <p class="progress" id="progress">Iniciando...</p>
    </div>

    <script>
        const progress = document.getElementById('progress');
        
        async function limparTudo() {
            try {
                // 1. Limpar sessionStorage
                progress.textContent = 'Limpando sessionStorage...';
                sessionStorage.clear();
                await sleep(300);
                
                // 2. Limpar localStorage
                progress.textContent = 'Limpando localStorage...';
                localStorage.clear();
                await sleep(300);
                
                // 3. Limpar todos os cookies
                progress.textContent = 'Limpando cookies...';
                document.cookie.split(";").forEach((c) => {
                    document.cookie = c
                        .replace(/^ +/, "")
                        .replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });
                await sleep(300);
                
                // 4. Limpar cache do service worker
                if ('serviceWorker' in navigator) {
                    progress.textContent = 'Limpando service workers...';
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (const registration of registrations) {
                        await registration.unregister();
                    }
                    await sleep(300);
                }
                
                // 5. Limpar cache do navegador
                if ('caches' in window) {
                    progress.textContent = 'Limpando cache do navegador...';
                    const names = await caches.keys();
                    for (const name of names) {
                        await caches.delete(name);
                    }
                    await sleep(300);
                }
                
                // 6. Forçar reload sem cache
                progress.textContent = 'Recarregando página...';
                await sleep(500);
                
                // Redirecionar para home com parâmetro de versão
                const timestamp = new Date().getTime();
                window.location.replace(`/?v=${timestamp}&cache=cleared`);
                
            } catch (error) {
                console.error('Erro ao limpar cache:', error);
                progress.textContent = 'Erro ao limpar cache. Redirecionando...';
                setTimeout(() => {
                    window.location.replace('/');
                }, 2000);
            }
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // Iniciar limpeza
        limparTudo();
    </script>
</body>
</html>
