# Deploy do backend Django na Railway (Heroku continua com o Procfile na raiz).
# Dockerfile evita o Nixpacks a executar o release do Procfile durante o build da imagem.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"
watchPatterns = [
    "backend/**",
    "Dockerfile.railway",
    "railway.toml",
]

[deploy]
# LWK_PROCESS_ROLE: web (padrão) | worker (qcluster) | cron (executar_cron_lwks)
startCommand = '''sh -c "case \"${LWK_PROCESS_ROLE:-web}\" in worker) exec sh scripts/start_worker.sh ;; cron) exec python manage.py executar_cron_lwks ;; *) exec gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-4} --threads 2 --worker-class gthread --worker-connections 1000 --timeout 60 --graceful-timeout 30 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --log-file - --access-logfile - --error-logfile - ;; esac"'''
releaseCommand = '''sh -c "sh scripts/railway_release.sh"'''
healthcheckPath = "/api/superadmin/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
