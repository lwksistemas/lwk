# Evolution API — WhatsApp Web (opcional, serviço separado do backend LWK)
# Uso local: docker compose -f docker-compose.evolution.yml up -d
# Produção: subir como serviço separado no Railway (ver docs/WHATSAPP_EVOLUTION.md)
#
# IMPORTANTE: use evoapicloud/evolution-api v2.3.7+ (atendai v2.2.3 retorna {count:0} no /connect)

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-local-key}
      SERVER_URL: http://localhost:8080
      QRCODE_LIMIT: "30"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: Chrome
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL:-postgresql://evolution:evolution@postgres:5432/evolution}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_pg:
