name: Security

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:
    branches: [main, master, develop, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django check
        run: python manage.py check
      - name: Clinica da Beleza test suite
        run: python manage.py test clinica_beleza.tests --verbosity=1
      - name: CRM Vendas test suite
        run: python manage.py test crm_vendas.tests --verbosity=1

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: CRM Vitest suite
        run: npm test -- lib/crm-*.test.ts

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: CRM E2E smoke (público, beta)
        env:
          PLAYWRIGHT_BASE_URL: https://beta.lwksistemas.com.br
        run: npm run test:e2e:crm-public

  frontend-e2e-authenticated:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Verificar secrets E2E
        id: e2e_creds
        env:
          CRM_E2E_EMAIL: ${{ secrets.CRM_E2E_EMAIL }}
          CRM_E2E_PASSWORD: ${{ secrets.CRM_E2E_PASSWORD }}
        run: |
          if [ -z "$CRM_E2E_EMAIL" ] || [ -z "$CRM_E2E_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Secrets CRM_E2E_* ausentes — pulando E2E autenticado"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.e2e_creds.outputs.skip != 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        if: steps.e2e_creds.outputs.skip != 'true'
        run: npm ci
      - name: Install Playwright Chromium
        if: steps.e2e_creds.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium
      - name: CRM E2E autenticado (beta)
        if: steps.e2e_creds.outputs.skip != 'true'
        env:
          PLAYWRIGHT_BASE_URL: https://beta.lwksistemas.com.br
          CRM_E2E_EMAIL: ${{ secrets.CRM_E2E_EMAIL }}
          CRM_E2E_PASSWORD: ${{ secrets.CRM_E2E_PASSWORD }}
          CRM_E2E_LOJA_SLUG: ${{ secrets.CRM_E2E_LOJA_SLUG }}
          CRM_E2E_ASSINATURA_TOKEN: ${{ secrets.CRM_E2E_ASSINATURA_TOKEN }}
        run: |
          npm run test:e2e:crm-auth
          npx playwright test e2e/crm-assinatura-publica.spec.ts --grep "token válido"

  backend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: pip install pip-audit bandit

      # Falha o build se houver vulnerabilidades conhecidas nas dependências.
      # Para ignorar temporariamente um CVE específico, use:
      #   pip-audit -r requirements.txt --ignore-vuln PYSEC-XXXX-XXXX
      - name: pip-audit (bloqueia em vulnerabilidades)
        run: pip-audit -r requirements.txt --desc on

      # Análise estática: falha apenas em severidade ALTA (-lll). Médias (ex.: B608
      # em SQL com identificadores quote_name) geram muito ruído em codebase legado.
      - name: bandit (bloqueia em severidade alta)
        run: |
          bandit -r . \
            -x ./tests,./test_*,./*/migrations \
            -lll -q \
            --skip B101

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci

      # Falha o build se houver vulnerabilidades de severidade HIGH ou CRITICAL.
      - name: npm audit (bloqueia em high+)
        run: npm audit --audit-level=high
